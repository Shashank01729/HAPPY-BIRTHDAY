<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0008" />
<title>Happy Birthday Radhika 🦇</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- WebGL canvas mounts here -->
  <div id="scene"></div>

  <!-- vignette + grain overlay -->
  <div id="vignette"></div>

  <!-- intro / gate -->
  <div id="intro">
    <div class="bat-emoji">🦇</div>
    <h1 class="intro-title">For Radhika</h1>
    <p class="intro-sub">a little something from the shadows…<br/><em>aka Vampika</em></p>
    <button id="enterBtn">Enter the Crypt 🩸</button>
    <p class="hint">tap / click anywhere later for a surprise</p>
  </div>

  <!-- main HTML title layered over 3D -->
  <div id="overlay" class="hidden">
    <h2 class="kicker">Happy Birthday</h2>
    <h1 class="name" data-text="RADHIKA">RADHIKA</h1>
    <p class="tagline">Queen of the Night · <span class="vamp">Vampika</span> 🦇</p>
    <p class="wish" id="wish"></p>
  </div>

  <!-- audio toggle -->
  <button id="soundBtn" class="hidden" title="toggle music">♪</button>

  <!-- floating message replay -->
  <button id="msgBtn" class="hidden" title="another wish">🩸 new wish</button>

  <!-- three.js via importmap (CDN, works on GitHub Pages) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
